<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Kana Typist — Japanese Typing Trainer (Updated: 2025-04-28)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: "Plus Jakarta Sans", -apple-system, "Segoe UI Variable Display", "Segoe UI", system-ui, sans-serif;
    background: #fbfaf6;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    background: white;
    border-radius: 18px;
    padding: 30px;
    box-shadow: 0 8px 24px -8px rgba(20,16,12,.10), 0 1px 0 rgba(20,16,12,.02);
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 30px;
  }
  .option-group {
    border: 1px solid #ececea;
    border-radius: 12px;
    padding: 20px;
  }
  .option-group h3 {
    margin: 0 0 15px;
    font-size: 14px;
    font-weight: 600;
    color: #4b5159;
  }
  .option {
    display: block;
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #d8d6d0;
    border-radius: 8px;
    background: white;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s ease;
  }
  .option:hover {
    background: #f7f4ee;
    border-color: #ff6d63;
  }
  .option.selected {
    background: #ff6d63;
    color: white;
    border-color: #ff6d63;
  }
  .start-btn {
    background: #ff6d63;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 25px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .start-btn:hover {
    background: #ec5347;
    transform: translateY(-2px);
  }
  .content {
    display: none;
    margin-top: 30px;
  }
  .content.active {
    display: block;
  }
  .reading-content {
    text-align: center;
    padding: 30px;
  }
  .sentence {
    font-family: "Zen Maru Gothic", "Hiragino Maru Gothic ProN", "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    font-size: 28px;
    line-height: 2;
    margin-bottom: 20px;
  }
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .toggle-btn {
    padding: 8px 16px;
    border: 1px solid #d8d6d0;
    background: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .toggle-btn.active {
    background: #ff6d63;
    color: white;
  }
  .translation {
    font-style: italic;
    color: #4b5159;
    margin-top: 15px;
    padding: 15px;
    background: #f7f4ee;
    border-radius: 8px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>か Kana Typist</h1>
  
  <div id="setup-screen" class="content active">
    <h2>Choose Your Practice Mode</h2>
    
    <div class="options">
      <div class="option-group">
        <h3>1. Syllabary</h3>
        <button class="option selected" data-alphabet="hiragana">ひらがな (Hiragana)</button>
        <button class="option" data-alphabet="katakana">カタカナ (Katakana)</button>
      </div>
      
      <div class="option-group">
        <h3>2. Mode</h3>
        <button class="option selected" data-mode="text">文章 (Text)</button>
        <button class="option" data-mode="letters">文字 (Letters)</button>
        <button class="option" data-mode="words">単語 (Words)</button>
        <button class="option" data-mode="reading">読解 (Reading Practice)</button>
      </div>
    </div>
    
    <button class="start-btn" onclick="startSession()">Begin Session →</button>
  </div>
  
  <div id="reading-screen" class="content">
    <div class="reading-content">
      <div class="sentence" id="sentence">私は学生です。</div>
      
      <div class="controls">
        <button class="toggle-btn active" id="romaji-toggle">ローマ字: ON</button>
        <button class="toggle-btn" id="translation-toggle">英語: OFF</button>
      </div>
      
      <div class="translation" id="translation" style="display: none;">
        I am a student.
      </div>
      
      <div style="margin-top: 30px;">
        <button class="toggle-btn" onclick="previousSentence()">← Previous</button>
        <button class="toggle-btn" onclick="nextSentence()">Next →</button>
        <button class="toggle-btn" onclick="backToSetup()">Back to Setup</button>
      </div>
    </div>
  </div>
</div>

<script>
// Simple state management
let currentAlphabet = 'hiragana';
let currentMode = 'text';
let romajiVisible = true;
let translationVisible = false;

// Reading sentences
const sentences = [
  {
    japanese: '私は学生です。',
    romaji: 'watashi wa gakusei desu.',
    translation: 'I am a student.'
  },
  {
    japanese: 'これは本です。',
    romaji: 'kore wa hon desu.',
    translation: 'This is a book.'
  },
  {
    japanese: '日本語を勉強します。',
    romaji: 'nihongo o benkyou shimasu.',
    translation: 'I study Japanese.'
  }
];

let currentSentenceIndex = 0;

// Mode selection
document.querySelectorAll('[data-alphabet]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-alphabet]').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentAlphabet = btn.dataset.alphabet;
  });
});

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentMode = btn.dataset.mode;
  });
});

// Romaji toggle
document.getElementById('romaji-toggle').addEventListener('click', () => {
  romajiVisible = !romajiVisible;
  const btn = document.getElementById('romaji-toggle');
  btn.textContent = romajiVisible ? 'ローマ字: ON' : 'ローマ字: OFF';
  btn.classList.toggle('active', romajiVisible);
});

// Translation toggle
document.getElementById('translation-toggle').addEventListener('click', () => {
  translationVisible = !translationVisible;
  const btn = document.getElementById('translation-toggle');
  btn.textContent = translationVisible ? '英語: ON' : '英語: OFF';
  btn.classList.toggle('active', translationVisible);
  document.getElementById('translation').style.display = translationVisible ? 'block' : 'none';
});

// Navigation
function previousSentence() {
  if (currentSentenceIndex > 0) {
    currentSentenceIndex--;
    updateSentence();
  }
}

function nextSentence() {
  if (currentSentenceIndex < sentences.length - 1) {
    currentSentenceIndex++;
    updateSentence();
  }
}

function updateSentence() {
  const sentence = sentences[currentSentenceIndex];
  document.getElementById('sentence').textContent = sentence.japanese;
  document.getElementById('translation').textContent = sentence.translation;
}

function backToSetup() {
  document.getElementById('setup-screen').classList.add('active');
  document.getElementById('reading-screen').classList.remove('active');
}

// Start session
function startSession() {
  if (currentMode === 'reading') {
    document.getElementById('setup-screen').classList.remove('active');
    document.getElementById('reading-screen').classList.add('active');
    updateSentence();
  } else {
    alert('Starting ' + currentMode + ' typing session...');
  }
}

// Initialize
updateSentence();
</script>
</body>
</html>
